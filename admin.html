<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinitum Admin</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#0b1120;
color:white;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:260px;
height:100vh;
background:#111827;
padding:20px;
}

.logo{
font-size:32px;
font-weight:bold;
margin-bottom:30px;
}

.menu button{
width:100%;
padding:15px;
margin-bottom:10px;
border:none;
border-radius:12px;
background:#1f2937;
color:white;
cursor:pointer;
}

.main{
margin-left:280px;
padding:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:#1f2937;
padding:25px;
border-radius:20px;
}

.number{
font-size:40px;
font-weight:bold;
margin-top:10px;
}

.logout{
background:#dc2626 !important;
}

</style>
</head>
<body>

<div class="sidebar">

<div class="logo">
Infinitum
</div>

<div class="menu">

<button onclick="location.href='index.html'">
Главная
</button>

<button>
Пользователи
</button>

<button>
История поиска
</button>

<button>
Настройки
</button>

<button class="logout" onclick="logout()">
Выход
</button>

</div>

</div>

<div class="main">

<h1>Панель администратора</h1>

<div class="cards">

<div class="card">
<h2>Пользователи</h2>
<div class="number">1</div>
</div>

<div class="card">
<h2>Поиски</h2>
<div class="number" id="searchCount">0</div>
</div>

<div class="card">
<h2>Статус</h2>
<div class="number">ON</div>
</div>

<div class="card">
<h2>Версия</h2>
<div class="number">1.0</div>
</div>

</div>

</div>

<script>

if(localStorage.getItem("admin") !== "true"){
location.href = "login.html";
}

function logout(){
localStorage.removeItem("admin");
location.href = "index.html";
}

let history =
JSON.parse(
localStorage.getItem("searchHistory")
|| "[]"
);

  <h2>Пользователи</h2>
<div id="usersCount">0</div>

<h2>Поиски</h2>
<div id="searchesCount">0</div>

<h2>Список пользователей</h2>
<div id="usersList"></div>
document.getElementById("searchCount")
.innerText = history.length;

</script>

</body>
  <script src="js/admin.js"></script>
</html>
