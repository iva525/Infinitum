<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinitum Login</title>

<style>

body{
background:#0f1117;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.login-box{
background:#1e293b;
padding:40px;
border-radius:20px;
width:350px;
box-shadow:0 0 30px rgba(0,0,0,.4);
}

h1{
text-align:center;
color:white;
margin-bottom:25px;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:10px;
background:#334155;
color:white;
font-size:16px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#4f46e5;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

#error{
color:#ef4444;
margin-top:10px;
text-align:center;
}

</style>
</head>

<body>

<div class="login-box">

<h1>Infinitum</h1>

<input
type="text"
id="user"
placeholder="Логин">

<input
type="password"
id="pass"
placeholder="Пароль">

<input id="login" placeholder="Логин">

<input id="password"
type="password"
placeholder="Пароль">

<button onclick="login()">
Войти
</button>

<button onclick="register()">
Регистрация
</button>

<div id="error"></div>

</div>

<script>

function login(){

let user =
document.getElementById("user").value.trim();

let pass =
document.getElementById("pass").value.trim();

if(!user || !pass){
document.getElementById("error").innerText =
"Введите логин и пароль";
return;
}

if(user === "adm" && pass === "12345"){

localStorage.setItem("admin","true");
localStorage.setItem("username",user);

window.location.href="admin.html";

}else{

localStorage.setItem("username",user);
window.location.href="profile.html";

}

}
</script>

</body>
</html>
